name: Weekly Review Summary Email

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send weekly summary email
        env:
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          SCRAPER_SECRET: ${{ secrets.SCRAPER_SECRET }}
        run: |
          curl -X POST "$NEXT_PUBLIC_APP_URL/api/weekly-email" \
            -H "Authorization: Bearer $SCRAPER_SECRET" \
            -H "Content-Type: application/json" \
            --fail \
            --show-error
